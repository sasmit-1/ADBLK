<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleanView</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.3);
      --accent-dim: rgba(124, 92, 252, 0.12);
      --green: #22d3a5;
      --green-glow: rgba(34, 211, 165, 0.25);
      --red: #ff5470;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* === HEADER === */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .logo-icon svg { width: 16px; height: 16px; }

    .logo-text {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    /* === TOGGLE === */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      transition: color 0.3s;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 12px;
      transition: all 0.3s ease;
      border: 1px solid var(--muted);
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .toggle input:checked + .slider {
      background: var(--accent-dim);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* === STATUS CARD === */
    .status-card {
      margin: 16px 16px 0;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .status-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--green), var(--accent));
      transition: opacity 0.4s;
    }

    .status-card.off::before {
      background: var(--red);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    .status-card.off .status-dot {
      background: var(--red);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .status-text span {
      color: var(--green);
      font-weight: 600;
    }

    .status-card.off .status-text span {
      color: var(--red);
    }

    /* === STATS GRID === */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 16px 0;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .stat-box:hover { border-color: var(--accent); }

    .stat-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      transition: color 0.3s;
    }

    .stat-box.highlight .stat-value { color: var(--accent); }
    .stat-box.green .stat-value { color: var(--green); }

    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* === RULE PILLS === */
    .rules-section {
      margin: 12px 16px 0;
    }

    .rules-title {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .rule-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      border: 1px solid;
      transition: all 0.3s;
    }

    .pill.active {
      background: rgba(34, 211, 165, 0.08);
      border-color: rgba(34, 211, 165, 0.35);
      color: var(--green);
    }

    .pill.inactive {
      background: rgba(255, 84, 112, 0.08);
      border-color: rgba(255, 84, 112, 0.3);
      color: var(--red);
    }

    /* === FOOTER === */
    .footer {
      margin: 14px 16px 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .reset-btn {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* === DISABLED STATE === */
    body.disabled .stats,
    body.disabled .rules-section {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1L14 4V8C14 11.3 11.3 14.3 8 15C4.7 14.3 2 11.3 2 8V4L8 1Z" stroke="#7c5cfc" stroke-width="1.5" fill="rgba(124,92,252,0.15)"/>
          <path d="M5.5 8L7.2 9.7L10.5 6.5" stroke="#22d3a5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">CleanView</div>
        <div class="logo-sub">Ad Blocker</div>
      </div>
    </div>

    <div class="toggle-wrap">
      <span class="toggle-label" id="toggleLabel">ON</span>
      <label class="toggle">
        <input type="checkbox" id="mainToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="status-card" id="statusCard">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Protection is <span>active</span></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box highlight">
      <div class="stat-label">Ads Blocked</div>
      <div class="stat-value" id="adsCount">—</div>
      <div class="stat-sub">all time</div>
    </div>
    <div class="stat-box green">
      <div class="stat-label">Rule Sets</div>
      <div class="stat-value">200</div>
      <div class="stat-sub">active rules</div>
    </div>
  </div>

  <div class="rules-section">
    <div class="rules-title">Active Filters</div>
    <div class="rule-pills" id="pillContainer">
      <span class="pill active" id="pillAds">Ads</span>
      <span class="pill active" id="pillTrackers">Trackers</span>
      <span class="pill active" id="pillCosmeticAds">Cosmetic</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">v1.0.0 · CleanView</span>
    <button class="reset-btn" id="resetBtn">Reset Counter</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
